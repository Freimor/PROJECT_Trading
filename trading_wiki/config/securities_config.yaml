# Securities trading config — MOEX via T-Invest
# Документация: trading_wiki/06-Стратегии автоматизированной LLM торговли/Securities_flow_design.md

version: "1.0.0"
env: sandbox  # sandbox | live

mode: paper  # dry_run | paper | shadow | live

# Режимы: index_dca (без LLM) | swing_signals (с LLM — для paper-теста LLM)
active_mode: swing_signals

index_dca:
  ticker: TMOS
  amount_rub: 10000
  order_type: MARKET
  schedule_cron: "0 10 1 * *"  # 10:00 MSK, 1-е число месяца

swing_signals:
  universe: [SBER, GAZP, LKOH, GMKN, YNDX]
  timeframe: 1d
  schedule_cron: "15 18 * * 1-5"  # 18:15 MSK, будни
  llm_min_confidence: 0.7
  llm:
    temperature: 0.1
    min_confidence: 0.7
  ollama_model: qwen3.5:9b
  prompt_version: "securities_validate_v1"
  paper_amount_rub: 5000
  prefer_limit_orders: true

universe_scan:
  enabled: true
  top_n: 5
  min_score: 0.35
  min_valtoday_mln: 15
  min_numtrades: 50
  max_scan_tickers: 25
  equities_only: true
  use_whitelist: false
  klines_limit: 60
  volume_ratio_min: 0.25
  momentum_bars: 5
  momentum_min_pct: 0.5
  rsi_active_low: 35
  rsi_active_high: 65
  weight_liquidity: 0.35
  weight_volume: 0.25
  weight_momentum: 0.20
  weight_rsi: 0.10
  weight_atr: 0.10

session:
  timezone: Europe/Moscow
  start_hour: 10
  end_hour: 19

# Лимиты риска — guardrails.yaml + runtime пресет (см. docs/roadmap-razvitiya.md)

tax:
  track_deals: true
  export_enabled: true

legal_notice: "Automated trading is operator responsibility. Not legal/tax advice."
