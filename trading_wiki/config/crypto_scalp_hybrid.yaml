# Crypto scalp 5m — rules_engine only (LLM выключен до настройки GPU)
# Включить LLM: llm_enabled: true и llm_sample_pct > 0

version: "1.0.0"

timeframe: 5m
schedule_cron: "*/5 * * * *"
schedule_minutes: 5

# Pre-session pair selection (vol / volume / diversification)
universe_scan:
  enabled: true
  use_catalog: true
  top_n: 3
  min_score: 0.35
  rescan_during_session: true
  rescan_interval_hours: 2
  klines_limit: 120
  atr_period: 14
  atr_pct_min: 0.22
  atr_pct_max: 2.5
  atr_pct_sweet_min: 0.35
  atr_pct_sweet_max: 1.2
  volume_ratio_min: 1.0
  momentum_bars: 3
  momentum_min_pct: 0.08
  rsi_active_low: 38
  rsi_active_high: 62
  max_pair_correlation: 0.85
  # Metrics: try session quote, other stables, cross (BTC/ETH); trade always in quote_asset
  scan_quote_fallbacks: [USDT, USDC, FDUSD, BUSD]
  scan_cross_quotes: [BTC, ETH, BNB]
  scan_metrics_mainnet_fallback: true   # testnet klines often flat — use mainnet for vol screen only
  # catalog = 20 пар в коде; exchange = все SPOT на Binance; combined = каталог + биржа
  scan_pool_mode: combined
  max_scan_bases: 60
  scan_exchange_listing_mainnet: true
  weight_atr: 0.35
  weight_volume: 0.25
  weight_momentum: 0.20
  weight_rsi: 0.10
  weight_trend: 0.10
  candidates: []   # extra symbols; empty + use_catalog → catalog + whitelist

pairs:
  - BTCUSDT
  - ETHUSDT

# LLM отключён: все одобренные фильтром сигналы идут через rules_engine
llm_enabled: false
llm_sample_pct: 0
# ambiguity_score: 0 = уверенный скрипт, 1 = полный шум
ambiguity:
  clear_max: 0.35      # ≤ → execute без LLM (script)
  border_min: 0.35     # зона возможного LLM
  border_max: 0.72     # > → skip (слишком неясно)
  llm_veto_only: true  # LLM только approve/reject, не генерирует вход

ollama_model_fast: qwen3.5:4b
ollama_model_fallback: qwen3.5:9b
prompt_version: crypto_scalp_validate_v1

llm:
  temperature: 0.05
  min_confidence: 0.65
  max_tokens: 256          # короткий JSON; без этого берётся guardrails.max_tokens=4096
  timeout_ms: 25000        # 5m scalp: превышение → reject (ollama_timeout), fail-closed

# Микро-правила 5m (до ambiguity)
scalp_rules:
  momentum_bars: 3
  momentum_min_pct: 0.15
  rsi_active_low: 38
  rsi_active_high: 62
  volume_spike_min: 1.35
  require_trend_align: true

risk:
  scale_notional_pct: 0.5   # половина от стандартного max_notional swing
  min_stop_distance_pct: 0.008

# Выход из scalp-позиции (MARKET SELL)
exit:
  use_stop: true
  use_take_profit: true
  max_hold_bars: 6           # 6×5m = 30 мин макс удержание
  synthetic_max_hold_bars: 2 # быстрый выход «наследных» позиций без записи в БД
  exit_on_momentum_flip: true
  momentum_flip_pct: -0.05   # выход если momentum ≤ −0.05%

retail_guard:
  enabled: true
  rsi_fomo_threshold: 78
  max_extension_above_ema200_pct: 0.08

on_chain:
  enabled: true
  mode: advisory   # scalp 5m: макро-контекст в логах, без блокировки сделок

paper:
  workflow_name: crypto-scalp-hybrid-paper
  auto_workflow_name: crypto-scalp-auto   # legacy alias в событиях; guardrails → workflow_name

dry_run:
  workflow_name: crypto-scalp-hybrid-dry-run

references:
  - https://arxiv.org/abs/2505.07078
  - https://www.bis.org/publ/work1049.htm
