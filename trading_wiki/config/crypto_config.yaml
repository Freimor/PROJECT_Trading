# Crypto trading config — этап 2 (dry_run)
# Документация: trading_wiki/06-Стратегии автоматизированной LLM торговли/Crypto_flow_design.md

version: "1.0.0"
env: testnet  # testnet | live (live только с manual flag + tag env/live)

mode: paper  # dry_run | paper | shadow | live

# Активная стратегия: llm_swing | dca_btc (можно переключить в web-console)
active_strategy: llm_swing

# Quote stablecoin for pairs and session budget (runtime override in console)
quote_asset: USDT
allowed_quote_assets: [USDT, USDC, FDUSD]

# Spot vs USDT-M futures (short requires usdt_futures + allow_short)
trading_product:
  market_type: spot          # spot | usdt_futures
  margin_mode: isolated      # isolated | cross
  leverage: 3
  max_leverage: 5
  allow_short: false
  position_mode: one_way
  use_reduce_only_on_exit: true

# Мониторинг margin call / ликвидации на USDT-M futures
futures_margin_monitor:
  enabled: true
  auto_stop_workflows: true      # выключить crypto workflow в n8n
  apply_kill_switch: false       # глобальный kill switch (MOEX не затрагивается)
  lookback_minutes: 120
  poll_account_margin_ratio: true
  margin_ratio_halt: 1.0           # maintMargin / marginBalance >= 1.0
  scan_before_trade: true          # проверка перед каждой futures-сделкой scalp

# Несколько primary workflow на одном рынке (scalp + swing одновременно)
multi_automation:
  enabled: false
  max_concurrent_primary: 2

pairs:
  - BTCUSDT
  - ETHUSDT

timeframe: 4h
schedule_cron: "5 */4 * * *"

# Лимиты риска — guardrails.yaml + runtime пресет (см. docs/roadmap-razvitiya.md, веха A)

llm:
  temperature: 0.1
  min_confidence: 0.7

ollama_model: qwen3.5:9b
prompt_version: "crypto_validate_v1"

# Rule filter до вызова LLM (отсекает 70–90% сигналов)
rule_filter:
  rsi_oversold: 35
  rsi_overbought: 65
  require_macd_cross: false

# BIS retail guard — block long in FOMO conditions
# Reference: https://www.bis.org/publ/work1049.htm
retail_guard:
  enabled: true
  rsi_fomo_threshold: 72
  max_extension_above_ema200_pct: 0.15
  price_percentile_lookback: 90
  price_percentile_block: 0.85
  volume_spike_multiplier: 2.5

on_chain:
  enabled: true
  mode: moderate   # swing 4h: блок только при сильном медвежьем hash ribbon

dca:
  symbol: BTCUSDT
  amount_usdt: 100
  schedule_cron: "0 12 * * 1"  # понедельник 12:00 UTC

api:
  testnet_base_url: https://testnet.binance.vision
  live_base_url: https://api.binance.com
  futures_testnet_base_url: https://testnet.binancefuture.com
  futures_live_base_url: https://fapi.binance.com
  enable_withdraw: false  # NEVER true

legal_notice: "Automated trading is operator responsibility. Not legal/tax advice."

compliance:
  geo_restrictions_reviewed: false
  legal_counsel_consulted: false
  kyc_completed: false
  separate_crypto_ledger: true
  fiat_offramp_automation: false
  tax_export_enabled: true
